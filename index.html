<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Campaña - Fajardo Presidente</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: #333;
            margin: 0;
            overscroll-behavior: none;
        }
        h2 {
            color: #1B3679;
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.5rem;
        }
        .editor-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .canvas-wrapper {
            position: relative;
            margin: 20px 0;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: grab;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            height: auto;
            border: 4px solid #fff;
            background-color: #ddd;
            touch-action: none;
        }
        .canvas-wrapper:active { cursor: grabbing; }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
        }
        label {
            font-weight: 700;
            font-size: 0.9em;
            color: #1B3679;
            text-transform: uppercase;
            white-space: nowrap;
        }
        input[type="range"] {
            flex-grow: 1;
            margin-left: 15px;
            cursor: pointer;
            accent-color: #1B3679;
            height: 25px;
        }
        .file-btn {
            display: block;
            width: 100%;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 5px;
            border: 2px dashed #1B3679;
            background: white;
            color: #1B3679;
            transition: 0.3s;
            position: relative;
            box-sizing: border-box;
        }
        .file-btn:active { background: #f0f0f0; }
        .file-btn input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        button#downloadBtn {
            background-color: #1B3679;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(27, 54, 121, 0.3);
            -webkit-tap-highlight-color: transparent;
        }
        button#downloadBtn:hover { background-color: #132759; }
        button#downloadBtn:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }

        /* ESTILOS DEL CRÉDITO */
        .credits {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
        }
        .credits a {
            color: #1B3679;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        .credits a:hover {
            color: #DC2329;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h2>Foto de Campaña</h2>

    <div class="editor-container">
        <div class="controls">
            <div class="file-btn">
                <span>📷 TOCAR PARA SUBIR FOTO</span>
                <input type="file" id="uploadInput" accept="image/*">
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="mainCanvas" width="770" height="770"></canvas>
        </div>

        <div class="controls">
            <div class="control-row">
                <label>Tamaño Foto</label>
                <input type="range" id="photoScale" min="0.1" max="3" step="0.05" value="1" disabled>
            </div>
            <button id="downloadBtn" disabled>DESCARGAR IMAGEN</button>
        </div>

        <div class="credits">
            Creado por: <a href="https://www.instagram.com/andres_santage" target="_blank">@andres_santage</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const uploadInput = document.getElementById('uploadInput');
        const photoScaleSlider = document.getElementById('photoScale');
        const downloadBtn = document.getElementById('downloadBtn');

        const config = {
            canvasSize: 770
        };

        let userImage = null;
        let frameImage = new Image();
        let photoState = { x: 0, y: 0, scale: 1 };
        let isDraggingPhoto = false;
        let startDragX, startDragY;

        // --- AQUÍ CARGAMOS TU ARCHIVO SVG ---
        // IMPORTANTE: El archivo Recurso 2.svg debe estar en la misma carpeta que este HTML
        frameImage.src = 'img-borde.svg';
        frameImage.onload = () => draw();

        uploadInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    userImage = new Image();
                    userImage.onload = () => {
                        photoState = { x: 0, y: 0, scale: 1 };
                        photoScaleSlider.value = 1;
                        photoScaleSlider.disabled = false;
                        downloadBtn.disabled = false;
                        draw();
                    };
                    userImage.src = event.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Esto recorta todo el canvas en forma de círculo (el borde exterior)
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2, 0, Math.PI * 2);
            ctx.clip();

            if (userImage) {
                ctx.save();
                // Esto recorta la foto del usuario para que no se salga por los bordes internos del marco
                // NOTA: Si el círculo de tu nuevo SVG es más grande o más pequeño, cambia este "268"
                ctx.beginPath();
                ctx.arc(config.canvasSize/2, config.canvasSize/2, 400, 0, Math.PI * 2);
                ctx.clip();
                const imgW = userImage.width * photoState.scale;
                const imgH = userImage.height * photoState.scale;
                const x = (canvas.width - imgW) / 2 + photoState.x;
                const y = (canvas.height - imgH) / 2 + photoState.y;
                ctx.drawImage(userImage, x, y, imgW, imgH);
                ctx.restore();
            } else {
                ctx.fillStyle = "#eee";
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, 268, 0, Math.PI * 2);
                ctx.fill();
            }

            // Dibuja el marco SVG encima de todo
            if (frameImage.complete) {
                ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
            }

            ctx.restore(); 
        }

        photoScaleSlider.addEventListener('input', (e) => {
            photoState.scale = parseFloat(e.target.value);
            draw();
        });

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function startDrag(e) {
            const pos = getPos(e);
            if (userImage) {
                isDraggingPhoto = true;
                startDragX = pos.x - photoState.x;
                startDragY = pos.y - photoState.y;
            }
        }

        function dragging(e) {
            if (!isDraggingPhoto) return;
            e.preventDefault();
            const pos = getPos(e);
            photoState.x = pos.x - startDragX;
            photoState.y = pos.y - startDragY;
            draw();
        }

        function endDrag() { isDraggingPhoto = false; }

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', dragging);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', startDrag, {passive: false});
        window.addEventListener('touchmove', dragging, {passive: false});
        window.addEventListener('touchend', endDrag);

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'fajardo_presidente.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

    </script>
</body>
</html>
